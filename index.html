<!DOCTYPE html>
<html>

<head>

<title>Qyrelle</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

/* animated background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,#ff003c55,transparent 40%),
radial-gradient(circle at 80% 70%,#ff003c33,transparent 40%),
radial-gradient(circle at 50% 50%,#ff003c22,transparent 50%);
animation:movebg 8s infinite alternate;
z-index:-1;
}

@keyframes movebg{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* logo */

h1{
margin-top:90px;
font-size:80px;
color:#ff003c;
text-shadow:
0 0 10px #ff003c,
0 0 20px #ff003c,
0 0 40px #ff003c;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.7;}
to{opacity:1;}
}

p{
color:#ccc;
font-size:20px;
}

/* buttons */

.button{
display:block;
width:260px;
margin:20px auto;
padding:14px;
border:2px solid #ff003c;
border-radius:10px;
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.button:hover{
background:#ff003c;
box-shadow:0 0 20px #ff003c;
transform:scale(1.05);
}

/* video */

.video{
margin-top:40px;
}

iframe{
border-radius:12px;
box-shadow:0 0 20px #ff003c44;
}

</style>

</head>

<body>

<h1>Qyrelle</h1>

<p>Dark Phonk Music</p>

<a class="button" href="https://youtube.com/@qyrelle" target="_blank">YouTube</a>

<a class="button" href="#">Latest Track</a>

<a class="button" href="#">Anime Edits</a>

<div class="video">

<h2>Latest Video</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/TQy2mFSVnsM"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</body>
</html>

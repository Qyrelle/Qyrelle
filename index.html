<!DOCTYPE html>
<html>

<head>

<title>Qyrelle</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* grid background */

body{
background-image:
linear-gradient(rgba(255,0,60,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,0,60,0.08) 1px, transparent 1px);
background-size:40px 40px;
animation:gridmove 20s linear infinite;
}

@keyframes gridmove{
0%{background-position:0 0;}
100%{background-position:40px 40px;}
}

/* layout */

.wrapper{
display:flex;
flex-direction:column;
height:100vh;
}

/* header */

header{
flex:0 0 auto;
text-align:center;
padding:20px;
}

h1{
font-size:50px;
color:#ff003c;
text-shadow:0 0 10px #ff003c;
}

/* content scroll */

main{
flex:1 1 auto;
overflow-y:auto;
text-align:center;
padding:20px;
}

/* footer */

footer{
flex:0 0 auto;
text-align:center;
padding:10px;
color:#888;
font-size:14px;
}

/* buttons */

.button{
display:block;
width:260px;
margin:15px auto;
padding:12px;
border:2px solid #ff003c;
border-radius:10px;
color:white;
text-decoration:none;
transition:0.3s;
}

.button:hover{
background:#ff003c;
box-shadow:0 0 15px #ff003c;
}

/* video */

iframe{
max-width:100%;
border-radius:12px;
box-shadow:0 0 20px #ff003c44;
}
</style>

</head>

<body>

<div class="wrapper">

<header>
<h1>Qyrelle</h1>
<p>Dark Phonk Music</p>
</header>

<main>

<a class="button" href="https://youtube.com/@qyrelle">YouTube</a>

<a class="button" href="#">Latest Track</a>

<a class="button" href="#">Anime Edits</a>

<h2>Latest Video</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/videoseries?list=PLrk3exvFXwThlJvdzBuuK8FrGnAJHbu6X"
allowfullscreen>
</iframe>

</main>

<footer>
© 2026 Qyrelle • Dark Phonk Music
</footer>

</div>

</body>
</html>

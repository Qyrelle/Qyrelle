<!DOCTYPE html>
<html>

<head>

<title>Qyrelle</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
background-color:black;

/* phonk grid */
background-image:
linear-gradient(rgba(255,0,60,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,0,60,0.08) 1px, transparent 1px);

background-size:40px 40px;
}

/* animated background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#ff003c22,transparent 70%);
animation:pulse 6s infinite;
z-index:-1;
}
body{
animation:gridmove 20s linear infinite;
}
<footer style="margin-top:60px;color:#888;font-size:14px;">
© 2026 Qyrelle • Dark Phonk Music
</footer>

@keyframes gridmove{
0%{background-position:0 0;}
100%{background-position:40px 40px;}
}

@keyframes pulse{
0%{opacity:0.2;}
50%{opacity:0.5;}
100%{opacity:0.2;}
}

@keyframes movebg{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* logo */

h1{
margin-top:90px;
font-size:70px;
color:#ff003c;
text-shadow:0 0 12px #ff003c;
}



p{
color:#ccc;
font-size:20px;
}

/* buttons */

.button{
display:block;
width:260px;
margin:20px auto;
padding:14px;
border:2px solid #ff003c;
border-radius:10px;
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.button:hover{
background:#ff003c;
box-shadow:0 0 20px #ff003c;
transform:scale(1.05);
}

/* video */

.video{
margin-top:40px;
}

iframe{
border-radius:12px;
box-shadow:0 0 20px #ff003c44;
}

</style>

</head>

<body>

<h1>Qyrelle</h1>

<p>Dark Phonk Music</p>

<a class="button" href="https://youtube.com/@qyrelle" target="_blank">YouTube</a>

<a class="button" href="https://youtube.com/playlist?list=PLrk3exvFXwThlJvdzBuuK8FrGnAJHbu6X" target="_blank">Latest Track</a>

<a class="button" href="https://youtube.com/@qyrelle/videos" target="_blank">Anime Edits</a>
<div class="video">

<h2>Latest Video</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/videoseries?list=PLrk3exvFXwThlJvdzBuuK8FrGnAJHbu6X"
title="Qyrelle Playlist"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen>
</iframe>

</div>

</body>
</html>

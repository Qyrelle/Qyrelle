<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>

<h2>Tracks</h2>


<div class="trackList">


<div class="track" onclick="playIndex(0)">

<img src="cover1.jpg">

<span>VENENO BATIDA</span>

</div>



<div class="track" onclick="playIndex(1)">

<img src="cover2.jpg">

<span>KOKORO PULSE</span>

</div>



<div class="track" onclick="playIndex(2)">

<img src="cover3.jpg">

<span>BATIDA FATAL</span>

</div>


</div>

</div>

</div>



</div>



<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerBox">

<img id="playerCover" src="cover1.jpg">

<div class="playerInfo">

<div id="trackName">No track</div>

<div id="floatingPlayer">

<div class="playerInner">

<img id="playerCover" src="cover1.jpg">

<span id="trackName">No track</span>

<button onclick="prevTrack()">◀</button>

<audio id="audioPlayer" controls></audio>

<button onclick="nextTrack()">▶</button>

</div>

</div>

</div>

</div>

</div>

<script>

let tracks = [

{
name: "VENENO BATIDA",
src: "music/VENENO BATIDA.mp3",
cover: "cover1.jpg"
},

{
name: "KOKORO PULSE",
src: "music/KOKORO PULSE.mp3",
cover: "cover1.jpg"
},

{
name: "BATIDA FATAL",
src: "music/BATIDA FATAL.mp3",
cover: "cover1.jpg"
}

];

let currentIndex = 0;

let player = document.getElementById("audioPlayer");
let title = document.getElementById("trackName");
let cover = document.getElementById("playerCover");


function playIndex(i){

currentIndex = i;

player.src = tracks[i].src;
title.innerText = tracks[i].name;
cover.src = tracks[i].cover;

player.play();

}


player.onended = function(){

nextTrack();

};


function nextTrack(){

currentIndex++;

if(currentIndex >= tracks.length){
currentIndex = 0;
}

playIndex(currentIndex);

}


function prevTrack(){

currentIndex--;

if(currentIndex < 0){
currentIndex = tracks.length - 1;
}

playIndex(currentIndex);

}
</script>


</body>
</html>

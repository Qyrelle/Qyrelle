<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>

<h2>Tracks</h2>
<input
type="text"
id="searchBox"
placeholder="Search track..."
onkeyup="searchTrack()"
class="searchBox"
>

<div class="trackList"></div>
</div>

</div>



</div>



<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerInner">

<img id="playerCover" src="cover1.jpg">

<span id="trackName">No track</span>

<button onclick="prevTrack()">◀</button>

<button onclick="toggleShuffle()">🔀</button>

<button onclick="toggleRepeat()">🔁</button>

<button onclick="nextTrack()">▶</button>
<audio id="audioPlayer" controls></audio>


</div>

</div>

<script>
let shuffleMode = false;
let repeatMode = false;
function searchTrack(){

let value =
document
.getElementById("searchBox")
.value
.toLowerCase();

let all =
document.querySelectorAll(".track");

all.forEach(track=>{

let name =
track.innerText.toLowerCase();

if(name.includes(value)){

track.style.display = "block";

}else{

track.style.display = "none";

}

});

}



function toggleShuffle(){

shuffleMode = !shuffleMode;

console.log("shuffle:", shuffleMode);

}



function toggleRepeat(){

repeatMode = !repeatMode;

console.log("repeat:", repeatMode);

}
</script>


</body>
</html>

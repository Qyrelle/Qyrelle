<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>

<h2>Tracks</h2>


<div class="trackList">


<div class="track" onclick="playTrack(this,'music/veneno.mp3','VENENO BATIDA')">

<img src="cover1.jpg">

<span>VENENO BATIDA</span>

</div>



<div class="track" onclick="playTrack(this,'music/kokoro pulse.mp3','KOKORO PULSE')">
<img src="cover2.jpg">

<span>KOKORO PULSE</span>

</div>



<div class="track" onclick="playTrack(this,'music/batida fatal.mp3','BATIDA FATAL')">
<img src="cover3.jpg">

<span>BATIDA FATAL</span>

</div>


</div>

</div>

</div>



</div>



<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerInner">

<img id="playerCover" src="cover1.jpg">

<span id="trackName">No track</span>

<button onclick="prevTrack()">◀</button>

<audio id="audioPlayer" controls></audio>

<button onclick="nextTrack()">▶</button>

</div>

</div>

<script>

let tracks = [

{
name:"VENENO BATIDA",
src:"music/VENENO BATIDA.mp3",
cover:"cover1.jpg"
},

{
name:"KOKORO PULSE",
src:"music/KOKORO PULSE.mp3",
cover:"cover2.jpg"
},

{
name:"BATIDA FATAL",
src:"music/BATIDA FATAL.mp3",
cover:"cover3.jpg"
},

{
name:"BATIDA FATAL 2",
src:"music/BATIDA FATAL 2.mp3",
cover:"cover1.jpg"
},

{
name:"Kawaii Overdrive",
src:"music/Kawaii Overdrive.mp3",
cover:"cover2.jpg"
},

{
name:"Neon Waifu Drift",
src:"music/Neon Waifu Drift.mp3",
cover:"cover3.jpg"
},

{
name:"Velvet Drop",
src:"music/Velvet Drop.mp3",
cover:"cover1.jpg"
}

];

let currentIndex = 0;



function playIndex(i){

currentIndex = i;

let player = document.getElementById("audioPlayer");
let title = document.getElementById("trackName");
let cover = document.getElementById("playerCover");

player.src = tracks[i].src;

title.innerText = tracks[i].name;

cover.src = tracks[i].cover;

player.play();

setActive(i);

}



function playTrack(i){

playIndex(i);

}



function nextTrack(){

currentIndex++;

if(currentIndex >= tracks.length){
currentIndex = 0;
}

playIndex(currentIndex);

}



function prevTrack(){

currentIndex--;

if(currentIndex < 0){
currentIndex = tracks.length - 1;
}

playIndex(currentIndex);

}



document.getElementById("audioPlayer").onended = function(){

nextTrack();

};



function setActive(i){

let all = document.querySelectorAll(".track");

all.forEach(t => t.classList.remove("activeTrack"));

if(all[i]){
all[i].classList.add("activeTrack");
}

}

</script>


</body>
</html>

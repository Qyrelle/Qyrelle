<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>

<h2>Tracks</h2>


<div class="trackList">


<div class="track" onclick="playTrack(this,'music/veneno.mp3','VENENO BATIDA')">

<img src="cover1.jpg">

<span>VENENO BATIDA</span>

</div>



<div class="track" onclick="playTrack(this,'music/kokoro pulse.mp3','KOKORO PULSE')">
<img src="cover2.jpg">

<span>KOKORO PULSE</span>

</div>



<div class="track" onclick="playTrack(this,'music/batida fatal.mp3','BATIDA FATAL')">
<img src="cover3.jpg">

<span>BATIDA FATAL</span>

</div>


</div>

</div>

</div>



</div>



<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerInner">

<img id="playerCover" src="cover1.jpg">

<span id="trackName">No track</span>

<button onclick="prevTrack()">◀</button>

<audio id="audioPlayer" controls></audio>

<button onclick="nextTrack()">▶</button>

</div>

</div>

<script>

let tracks = [

{
name: "VENENO BATIDA",
src: "music/veneno.mp3",
cover: "cover1.jpg"
},

{
name: "KOKORO PULSE",
src: "music/kokoro pulse.mp3",
cover: "cover2.jpg"
},

{
name: "BATIDA FATAL",
src: "music/batida fatal.mp3",
cover: "cover3.jpg"
}

];

let currentTrackElement = null;
let currentIndex = 0;



function playTrack(el,src,name){

let player = document.getElementById("audioPlayer");
let title = document.getElementById("trackName");
let cover = document.getElementById("playerCover");

player.src = src;
title.innerText = name;

player.play();

if(currentTrackElement){
currentTrackElement.classList.remove("activeTrack");
}

el.classList.add("activeTrack");

currentTrackElement = el;


// set index

for(let i=0;i<tracks.length;i++){

if(tracks[i].src === src){

currentIndex = i;

}

}

}



// play by index

function playIndex(i){

let player = document.getElementById("audioPlayer");
let title = document.getElementById("trackName");
let cover = document.getElementById("playerCover");

player.src = tracks[i].src;

title.innerText = tracks[i].name;

cover.src = tracks[i].cover;

player.play();

}



// next

function nextTrack(){

currentIndex++;

if(currentIndex >= tracks.length){
currentIndex = 0;
}

playIndex(currentIndex);

}



// prev

function prevTrack(){

currentIndex--;

if(currentIndex < 0){
currentIndex = tracks.length - 1;
}

playIndex(currentIndex);

}



// autoplay next

document.getElementById("audioPlayer").onended = function(){

nextTrack();

};

</script>


</body>
</html>

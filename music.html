<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>


<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>
<h2>Tracks</h2>

<input
type="text"
id="searchBox"
placeholder="Search track..."
onkeyup="searchTrack()"
class="searchBox"
>

<div class="trackList"></div>

</div>
</div>

</div>


<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerInner">

<img id="playerCover" src="cover1.jpg">

<span id="trackName">No track</span>

<button onclick="prevTrack()">◀</button>

<button id="shuffleBtn" onclick="toggleShuffle()">🔀</button>

<button id="repeatBtn" onclick="toggleRepeat()">🔁</button>

<button onclick="nextTrack()">▶</button>

<audio id="audioPlayer" controls></audio>

</div>
</div>


<script>

let shuffleMode = false;
let repeatMode = false;

let tracks = [];
let currentIndex = 0;

let player = document.getElementById("audioPlayer");
let title = document.getElementById("trackName");
let cover = document.getElementById("playerCover");
let trackList = document.querySelector(".trackList");


// LOAD PLAYLIST

fetch("playlist.json")
.then(res => res.json())
.then(data => {

tracks = data;
buildPlaylist();

});



// BUILD UI

function buildPlaylist(){

trackList.innerHTML = "";

tracks.forEach((track,i)=>{

let div = document.createElement("div");

div.className = "track";

div.onclick = () => playIndex(i);

div.innerHTML = `
<div class="coverBox">
<img src="${track.cover}">
<div class="playIcon">▶</div>
</div>

<div class="trackTitle">${track.name}</div>
`;

trackList.appendChild(div);

});

}



// PLAY

function playIndex(i){

currentIndex = i;

player.src = tracks[i].src;
title.innerText = tracks[i].name;
cover.src = tracks[i].cover;

player.play();

setActive(i);

}



// NEXT

function nextTrack(){

if(shuffleMode){

currentIndex =
Math.floor(Math.random() * tracks.length);

playIndex(currentIndex);
return;

}

currentIndex++;

if(currentIndex >= tracks.length){
currentIndex = 0;
}

playIndex(currentIndex);

}



// PREV

function prevTrack(){

if(shuffleMode){

currentIndex =
Math.floor(Math.random() * tracks.length);

playIndex(currentIndex);
return;

}

currentIndex--;

if(currentIndex < 0){
currentIndex = tracks.length - 1;
}

playIndex(currentIndex);

}



// AUTOPLAY

player.onended = function(){

if(repeatMode){
playIndex(currentIndex);
}else{
nextTrack();
}

};



// ACTIVE

function setActive(i){

let all = document.querySelectorAll(".track");

all.forEach(t => t.classList.remove("activeTrack"));

if(all[i]){
all[i].classList.add("activeTrack");
}

}



// SEARCH

function searchTrack(){

let value =
document.getElementById("searchBox")
.value
.toLowerCase();

let all =
document.querySelectorAll(".track");

all.forEach(track=>{

let name =
track.innerText.toLowerCase();

if(name.includes(value)){
track.style.display = "block";
}else{
track.style.display = "none";
}

});

}



// TOGGLE

function toggleShuffle(){

shuffleMode = !shuffleMode;

let btn =
document.getElementById("shuffleBtn");

if(shuffleMode){

btn.classList.add("activeBtn");

}else{

btn.classList.remove("activeBtn");

}

}

function toggleRepeat(){

repeatMode = !repeatMode;

let btn =
document.getElementById("repeatBtn");

if(repeatMode){

btn.classList.add("activeBtn");

}else{

btn.classList.remove("activeBtn");

}

}

</script>

</body>
</html>

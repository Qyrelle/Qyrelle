<!DOCTYPE html>
<html>
<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>

<div class="main">

<div class="center">

<h1>Music</h1>

<h2>Tracks</h2>

<div class="track"
onclick="playTrack('music/VENENO BATIDA.mp3','VENENO BATIDA')">

<img src="cover1.jpg">
<span>VENENO BATIDA</span>

</div>

<div class="track"
onclick="playTrack('music/KOKORO PULSE.mp3','KOKORO PULSE')">

<img src="cover1.jpg">
<span>KOKORO PULSE</span>

</div>

<div class="track"
onclick="playTrack('music/BATIDA FATAL.mp3','BATIDA FATAL')">

<img src="cover1.jpg">
<span>BATIDA FATAL</span>

</div>

</div>

</div>

</div>

</main>

<div id="floatingPlayer">

<div class="playerInner">

<span id="trackName">No track</span>

<audio id="audioPlayer" controls></audio>

</div>

</div>

<script>

function playTrack(src,name){

let player=document.getElementById("audioPlayer");
let title=document.getElementById("trackName");

player.src=src;
title.innerText=name;

player.play();

}

</script>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>

<h2>Tracks</h2>


<div class="trackList"></div>
</div>

</div>



</div>



<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerInner">

<img id="playerCover" src="cover1.jpg">

<span id="trackName">No track</span>

<button onclick="prevTrack()">◀</button>

<button onclick="shuffleTrack()">🔀</button>

<button onclick="repeatTrack()">🔁</button>

<audio id="audioPlayer" controls></audio>

<button onclick="nextTrack()">▶</button>

</div>

</div>

<script>

let tracks = [];
let currentIndex = 0;

let player = document.getElementById("audioPlayer");
let title = document.getElementById("trackName");
let cover = document.getElementById("playerCover");
let trackList = document.querySelector(".trackList");


// LOAD PLAYLIST
fetch("playlist.json")
.then(res => res.json())
.then(data => {

tracks = data;

buildPlaylist();

});



// CREATE TRACK LIST UI
function buildPlaylist(){

trackList.innerHTML = "";

tracks.forEach((track,i)=>{

let div = document.createElement("div");

div.className = "track";

div.onclick = () => playIndex(i);

div.innerHTML = `
<img src="${track.cover}">
<span>${track.name}</span>
`;

trackList.appendChild(div);

});

}



// PLAY TRACK
function playIndex(i){

currentIndex = i;

player.src = tracks[i].src;

title.innerText = tracks[i].name;

cover.src = tracks[i].cover;

player.play();

setActive(i);

}



// NEXT
function nextTrack(){

currentIndex++;

if(currentIndex >= tracks.length){
currentIndex = 0;
}

playIndex(currentIndex);

}



// PREV
function prevTrack(){

currentIndex--;

if(currentIndex < 0){
currentIndex = tracks.length - 1;
}

playIndex(currentIndex);

}



// AUTOPLAY
player.onended = function(){

if(repeatMode){

playIndex(currentIndex);

}else{

nextTrack();

}

};



// ACTIVE TRACK GLOW
function setActive(i){

let all = document.querySelectorAll(".track");

all.forEach(t => t.classList.remove("activeTrack"));

if(all[i]){
all[i].classList.add("activeTrack");
}

}
let repeatMode = false;
  function shuffleTrack(){

let i = Math.floor(Math.random() * tracks.length);

playIndex(i);

}



function repeatTrack(){

repeatMode = !repeatMode;

}
</script>


</body>
</html>

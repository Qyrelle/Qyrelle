<!DOCTYPE html>
<html>

<head>

<title>Qyrelle Music</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Qyrelle</h2>

<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="video.html">Video</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="content">

<h1>Music</h1>

<h2>Tracks</h2>


<div class="trackList">


<div class="track"
onclick="playTrack('music/VENENO BATIDA.mp3','VENENO BATIDA')">

<img src="cover1.jpg">

<span>VENENO BATIDA</span>

</div>



<div class="track"
onclick="playTrack('music/KOKORO PULSE.mp3','KOKORO PULSE')">

<img src="cover2.jpg">

<span>KOKORO PULSE</span>

</div>



<div class="track"
onclick="playTrack('music/BATIDA FATAL.mp3','BATIDA FATAL')">

<img src="cover3.jpg">

<span>BATIDA FATAL</span>

</div>


</div>

</div>

</div>



</div>



<!-- PLAYER -->

<div id="floatingPlayer">

<div class="playerBox">

<img id="playerCover" src="cover1.jpg">

<div class="playerInfo">

<div id="trackName">No track</div>

<audio id="audioPlayer" controls></audio>

</div>

</div>

</div>

<script>

function playTrack(src,name){

let player=document.getElementById("audioPlayer");
let title=document.getElementById("trackName");
let cover=document.getElementById("playerCover");

player.src=src;
title.innerText=name;

cover.src="cover1.jpg";

player.play();

}
</script>


</body>
</html>
